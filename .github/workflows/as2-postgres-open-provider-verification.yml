name: AS2 PostgreSQL Open Provider Verification

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/as2-postgres-open-provider-verification.yml"
      - "docker-compose.as2-postgres-mini-poc.yml"
      - "tests/test_as2_postgresql_external_provider_p0645.py"

jobs:
  docker-compose-verification:
    name: P0.6.45 Docker Compose verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AS2_POSTGRES_TEST_DSN: postgresql://as2:as2_dev_only@localhost:55432/as2_mini_poc?sslmode=disable
      AS2_PGBOUNCER_TEST_DSN: postgresql://as2:as2_dev_only@localhost:56432/as2_mini_poc?sslmode=disable
      AS2_ENABLE_CDC_VERIFICATION: "1"
      AS2_DEBEZIUM_URL: http://localhost:58083
      AS2_ENABLE_DEBEZIUM_CONNECTOR_SMOKE: "1"
      AS2_REDPANDA_CONTAINER: as2-postgres-mini-poc-redpanda
      AS2_DEBEZIUM_POSTGRES_HOST: postgres
      AS2_DEBEZIUM_POSTGRES_PORT: "5432"
      AS2_DEBEZIUM_POSTGRES_USER: as2
      AS2_DEBEZIUM_POSTGRES_PASSWORD: as2_dev_only
      AS2_DEBEZIUM_POSTGRES_DB: as2_mini_poc
      AS2_POSTGRES_LATENCY_SAMPLE_SIZE: "100"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verification dependencies
        run: python -m pip install pytest "psycopg[binary]"

      - name: Start verification-only Docker Compose stack
        run: docker compose -f docker-compose.as2-postgres-mini-poc.yml up -d

      - name: Wait for PostgreSQL
        run: |
          for i in {1..60}; do
            if docker exec as2-postgres-mini-poc-postgres pg_isready -U as2 -d as2_mini_poc; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.as2-postgres-mini-poc.yml logs postgres
          exit 1

      - name: Wait for PgBouncer
        run: |
          for i in {1..60}; do
            if docker compose -f docker-compose.as2-postgres-mini-poc.yml logs pgbouncer | grep -qi "listening"; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.as2-postgres-mini-poc.yml logs pgbouncer
          exit 1

      - name: Wait for Debezium REST
        run: |
          for i in {1..90}; do
            if curl -fsS "$AS2_DEBEZIUM_URL/connectors" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.as2-postgres-mini-poc.yml logs debezium
          exit 1

      - name: Run external/open PostgreSQL verification harness
        run: python -m pytest -q tests/test_as2_postgresql_external_provider_p0645.py

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.as2-postgres-mini-poc.yml logs

      - name: Stop verification-only Docker Compose stack
        if: always()
        run: docker compose -f docker-compose.as2-postgres-mini-poc.yml down -v
