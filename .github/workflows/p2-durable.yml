name: P2 Durable Initial Run

on:
  pull_request:
  workflow_dispatch:

jobs:
  p2a-initial-run:
    name: p2a-initial-run-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run P2a owning tests
        run: python -m pytest -q tests/test_durable_execution.py
