# AS2 P0.6.44-dev verification-only PostgreSQL mini-POC stack.
#
# This compose file is NOT production infrastructure and is NOT official Q8/Q8a/Q10 evidence.
# It is a local/open-source verification harness for exercising PostgreSQL-shaped behavior
# before a target infrastructure answer is available.
#
# Verification-only scope:
#   - PostgreSQL SQL semantics: ON CONFLICT, UPDATE ... RETURNING, local transactions
#   - Polling branch SQL semantics: FOR UPDATE SKIP LOCKED claim pattern
#   - PgBouncer transaction-mode compatibility / SET LOCAL isolation rehearsal
#   - Optional CDC smoke rehearsal through Debezium + Redpanda when enabled locally
#
# Locked / non-goals:
#   - no production ENABLED activation
#   - no runtime wiring
#   - no official infra sign-off
#   - no external audit sink commitment
#   - no durable production backend selection

name: as2-postgres-mini-poc-verification

services:
  postgres:
    image: postgres:16
    container_name: as2-postgres-mini-poc-postgres
    labels:
      as2.scope: "verification-only"
      as2.production: "false"
      as2.patch: "P0.6.44-dev"
    environment:
      POSTGRES_DB: as2_mini_poc
      POSTGRES_USER: as2
      POSTGRES_PASSWORD: as2_dev_only
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_slot_wal_keep_size=10GB"
      - "-c"
      - "shared_preload_libraries="
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U as2 -d as2_mini_poc"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: as2-postgres-mini-poc-pgbouncer
    labels:
      as2.scope: "verification-only"
      as2.production: "false"
      as2.patch: "P0.6.44-dev"
    environment:
      DATABASE_URL: postgres://as2:as2_dev_only@postgres:5432/as2_mini_poc
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
    ports:
      - "56432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: as2-postgres-mini-poc-redpanda
    labels:
      as2.scope: "verification-only"
      as2.production: "false"
      as2.patch: "P0.6.44-dev"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "19092:9092"

  debezium:
    image: debezium/connect:2.7
    container_name: as2-postgres-mini-poc-debezium
    labels:
      as2.scope: "verification-only"
      as2.production: "false"
      as2.patch: "P0.6.44-dev"
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: as2-postgres-mini-poc-connect
      CONFIG_STORAGE_TOPIC: as2_connect_configs
      OFFSET_STORAGE_TOPIC: as2_connect_offsets
      STATUS_STORAGE_TOPIC: as2_connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      AS2_CDC_DECODER_PREFERRED: pgoutput
    ports:
      - "58083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
